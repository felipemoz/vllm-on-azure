apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-gateway
  namespace: vllm
  labels:
    app.kubernetes.io/name: vllm-gateway
    app.kubernetes.io/part-of: vllm-on-azure
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm-gateway
    spec:
      # Runs on system nodes (non-Spot) — always available
      nodeSelector:
        kubernetes.io/os: linux
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: hardware
                    operator: NotIn
                    values:
                      - gpu
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: vllm-gateway
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: install-deps
          image: python:3.12-slim
          command: ["pip", "install", "--target=/deps", "aiohttp>=3.9.0"]
          volumeMounts:
            - name: deps
              mountPath: /deps
      containers:
        - name: gateway
          image: python:3.12-slim
          command: ["python", "/app/gateway.py"]
          env:
            - name: PYTHONPATH
              value: "/deps"
            - name: VLLM_UPSTREAM
              value: "http://vllm:8000"
            - name: HEALTH_INTERVAL
              value: "3"
            - name: GATEWAY_PORT
              value: "8080"
            - name: MAINTENANCE_MSG
              value: "Perae que estamos trocando o pneu do aviao voando. O modelo esta sendo recarregado em uma nova instancia. Tente novamente em alguns instantes."
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /gateway/status
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /gateway/status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: gateway-code
              mountPath: /app
            - name: deps
              mountPath: /deps
      volumes:
        - name: gateway-code
          configMap:
            name: vllm-gateway-code
        - name: deps
          emptyDir: {}
