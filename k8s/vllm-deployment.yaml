apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: vllm
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/part-of: vllm-on-azure
spec:
  replicas: ${VLLM_REPLICAS}
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
    spec:
      terminationGracePeriodSeconds: 30
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "kubernetes.azure.com/scalesetpriority"
          operator: "Equal"
          value: "spot"
          effect: "NoSchedule"
      nodeSelector:
        hardware: gpu
      containers:
        - name: vllm
          image: ${VLLM_IMAGE}
          args:
            - "--model"
            - "${VLLM_MODEL}"
            - "--tensor-parallel-size"
            - "${VLLM_GPU_COUNT}"
            - "--max-model-len"
            - "${VLLM_MAX_MODEL_LEN}"
            - "--trust-remote-code"
            - "--enable-chunked-prefill"
            - "--gpu-memory-utilization"
            - "0.95"
            - "--dtype"
            - "auto"
            - "--reasoning-parser"
            - "qwen3"
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: "16"
              memory: "128Gi"
              nvidia.com/gpu: "${VLLM_GPU_COUNT}"
            limits:
              cpu: "90"
              memory: "800Gi"
              nvidia.com/gpu: "${VLLM_GPU_COUNT}"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 10
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 300
            periodSeconds: 10
            failureThreshold: 10
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-model-cache
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 32Gi
